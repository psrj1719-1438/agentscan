name: AgentScan

on:
  pull_request_target:
    types: [opened, reopened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  agentscan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache AgentScan analysis
        uses: actions/cache@v4
        with:
          path: .agentscan-cache
          key: agentscan-cache-${{ github.actor }}
          restore-keys: agentscan-cache-
      - name: AgentScan
        uses: MatteoGabriele/agentscan-action@d07b19b22bceafa1c573ebd7339e4e2c8e1ba172
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-members: "MatteoGabriele"
          cache-path: ".agentscan-cache"
